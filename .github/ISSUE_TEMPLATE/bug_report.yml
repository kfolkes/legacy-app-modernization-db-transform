name: bug_report
description: File a bug report
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug!
  - type: input
    id: stack
    attributes:
      label: Which flow?
      placeholder: "/dotnet.modernize or /java.modernize"
    validations:
      required: true
  - type: input
    id: phase
    attributes:
      label: Which phase failed?
      placeholder: "e.g. Phase 4: Implementation"
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what did you observe?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Open Codespace
        2. Run /dotnet.modernize
        3. ...
  - type: textarea
    id: logs
    attributes:
      label: Logs / evidence
      render: shell
